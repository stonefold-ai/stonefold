<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" font-family="ui-monospace, 'Cascadia Mono', Consolas, Menlo, monospace">
  <defs>
    <marker id="a" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#a89c8c"/>
    </marker>
    <marker id="ab" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#d59a45"/>
    </marker>
  </defs>
  <style>
    .box{fill:#1d1a17;stroke:#37312a;stroke-width:1}
    .inner{fill:#232019;stroke:#37312a;stroke-width:1}
    .t{fill:#ece6d9;font-size:12px;font-weight:600;letter-spacing:.04em}
    .s{fill:#a89c8c;font-size:11px}
    .w{fill:#ece6d9;font-size:11px}
    .b{fill:#d59a45;font-size:12px;font-weight:600;letter-spacing:.04em}
    .flow{stroke:#a89c8c;stroke-width:1.2;fill:none}
    .flowb{stroke:#d59a45;stroke-width:1.2;fill:none}
  </style>

  <rect x="0" y="0" width="1120" height="650" fill="#141210"/>
  <text class="b" x="20" y="28">STONEFOLD — HOW THE PIECES FIT (v0.6)</text>

  <!-- AGENT -->
  <rect class="box" x="20" y="150" width="170" height="72" rx="6"/>
  <text class="t" x="105" y="176" text-anchor="middle">AGENT</text>
  <text class="s" x="105" y="194" text-anchor="middle">untrusted, foolable</text>
  <text class="s" x="105" y="208" text-anchor="middle">an LLM loop (yours)</text>

  <text class="s" x="105" y="246" text-anchor="middle">identity (actor + session)</text>
  <text class="s" x="105" y="260" text-anchor="middle">comes from your transport,</text>
  <text class="s" x="105" y="274" text-anchor="middle">never from the payload</text>

  <!-- agent -> gateway -->
  <line class="flowb" x1="190" y1="186" x2="296" y2="186" marker-end="url(#ab)"/>
  <text class="s" x="243" y="158" text-anchor="middle">submit_intent</text>
  <text class="s" x="243" y="172" text-anchor="middle">(SIF, typed)</text>
  <text class="s" x="243" y="204" text-anchor="middle">the only path</text>

  <!-- GATEWAY -->
  <rect x="300" y="70" width="270" height="340" rx="8" class="box" stroke="#d59a45" stroke-width="1.4"/>
  <text class="b" x="435" y="96" text-anchor="middle">GATEWAY — deterministic</text>
  <text class="s" x="435" y="112" text-anchor="middle">default deny · deny wins</text>
  <text class="s" x="435" y="126" text-anchor="middle">no LLM in the decision path</text>

  <rect class="inner" x="316" y="136" width="238" height="24" rx="4"/>
  <text class="w" x="435" y="152" text-anchor="middle">1 resolve — registry lookup</text>
  <rect class="inner" x="316" y="166" width="238" height="24" rx="4"/>
  <text class="w" x="435" y="182" text-anchor="middle">2 authorize — allow / deny</text>
  <rect class="inner" x="316" y="196" width="238" height="24" rx="4"/>
  <text class="w" x="435" y="212" text-anchor="middle">3 scope — injected filter</text>
  <rect class="inner" x="316" y="226" width="238" height="24" rx="4" stroke="#d59a45"/>
  <text class="w" x="435" y="242" text-anchor="middle">4 gates — limits, approvals</text>
  <rect class="inner" x="316" y="256" width="238" height="24" rx="4"/>
  <text class="w" x="435" y="272" text-anchor="middle">5 kill-switch check</text>
  <rect class="inner" x="316" y="286" width="238" height="24" rx="4"/>
  <text class="w" x="435" y="302" text-anchor="middle">6 stage effect / run read</text>
  <rect class="inner" x="316" y="316" width="238" height="24" rx="4"/>
  <text class="w" x="435" y="332" text-anchor="middle">7 audit — every attempt</text>

  <text class="s" x="435" y="368" text-anchor="middle">deny / hold → refusal to the</text>
  <text class="s" x="435" y="382" text-anchor="middle">agent, with a reason code</text>
  <text class="s" x="435" y="396" text-anchor="middle">and a retry class (v0.6)</text>

  <!-- YOUR CODE -->
  <rect class="box" x="300" y="482" width="290" height="112" rx="6"/>
  <text class="b" x="445" y="506" text-anchor="middle">YOUR CODE — registered</text>
  <text class="s" x="445" y="524" text-anchor="middle">precondition checks: pass/fail/hold</text>
  <text class="s" x="445" y="538" text-anchor="middle">content hooks: pass/block</text>
  <text class="s" x="445" y="552" text-anchor="middle">scope predicates: row filters</text>
  <text class="s" x="445" y="570" text-anchor="middle">declared by NAME in the registry</text>
  <line class="flow" x1="435" y1="482" x2="435" y2="414" marker-end="url(#a)"/>
  <text class="s" x="450" y="452">gates call these</text>

  <!-- OPERATOR -->
  <rect class="box" x="620" y="70" width="190" height="56" rx="6"/>
  <text class="t" x="715" y="92" text-anchor="middle">OPERATOR</text>
  <text class="s" x="715" y="110" text-anchor="middle">approve / reject · kill</text>
  <line class="flow" x1="715" y1="126" x2="715" y2="156" marker-end="url(#a)"/>

  <!-- OUTBOX -->
  <rect class="box" x="620" y="160" width="190" height="104" rx="6"/>
  <text class="t" x="715" y="184" text-anchor="middle">OUTBOX</text>
  <text class="s" x="715" y="202" text-anchor="middle">staged effects, durable</text>
  <text class="s" x="715" y="216" text-anchor="middle">held rows await release</text>
  <text class="s" x="715" y="230" text-anchor="middle">decision TTL stamped</text>
  <text class="s" x="715" y="244" text-anchor="middle">in-memory or Postgres</text>
  <line class="flowb" x1="570" y1="212" x2="616" y2="212" marker-end="url(#ab)"/>
  <text class="s" x="593" y="202" text-anchor="middle">stage</text>

  <!-- WORKER -->
  <rect class="box" x="620" y="310" width="190" height="104" rx="6"/>
  <text class="t" x="715" y="334" text-anchor="middle">DISPATCH WORKER</text>
  <text class="s" x="715" y="352" text-anchor="middle">claims one row at a time</text>
  <text class="s" x="715" y="366" text-anchor="middle">recheck: kill, TTL,</text>
  <text class="s" x="715" y="380" text-anchor="middle">volatile gates; send</text>
  <text class="s" x="715" y="394" text-anchor="middle">exactly once</text>
  <line class="flow" x1="715" y1="264" x2="715" y2="306" marker-end="url(#a)"/>

  <!-- CONNECTORS -->
  <rect class="box" x="850" y="310" width="250" height="104" rx="6"/>
  <text class="t" x="975" y="334" text-anchor="middle">CONNECTORS</text>
  <text class="s" x="975" y="352" text-anchor="middle">your adapters: sql · http</text>
  <text class="s" x="975" y="366" text-anchor="middle">· email · in-memory</text>
  <text class="s" x="975" y="380" text-anchor="middle">execute + apply the scope;</text>
  <text class="s" x="975" y="394" text-anchor="middle">no policy logic inside</text>
  <line class="flowb" x1="810" y1="362" x2="846" y2="362" marker-end="url(#ab)"/>

  <!-- SYSTEMS -->
  <rect class="box" x="850" y="160" width="250" height="76" rx="6"/>
  <text class="t" x="975" y="188" text-anchor="middle">YOUR SYSTEMS</text>
  <text class="s" x="975" y="206" text-anchor="middle">database · email · payments</text>
  <text class="s" x="975" y="220" text-anchor="middle">reachable only through here</text>
  <line class="flowb" x1="975" y1="306" x2="975" y2="240" marker-end="url(#ab)"/>

  <!-- OBLIGATION REGISTRY -->
  <rect class="box" x="850" y="452" width="250" height="128" rx="6" stroke="#d59a45"/>
  <text class="b" x="975" y="476" text-anchor="middle">OBLIGATION REGISTRY</text>
  <text class="s" x="975" y="494" text-anchor="middle">v0.6 — the system of record</text>
  <text class="s" x="975" y="508" text-anchor="middle">requireMatch queries: open</text>
  <text class="s" x="975" y="522" text-anchor="middle">orders, prescriptions ...</text>
  <text class="s" x="975" y="544" text-anchor="middle">reserve at stage · consume</text>
  <text class="s" x="975" y="558" text-anchor="middle">at settle · release on cancel</text>

  <path class="flowb" d="M570 238 h30 v322 h246" marker-end="url(#ab)"/>
  <text class="s" x="712" y="552" text-anchor="middle">query + reserve</text>
  <path class="flow" d="M760 414 v86 h86" marker-end="url(#a)"/>
  <text class="s" x="842" y="494" text-anchor="end">consume / release</text>

  <!-- AUDIT -->
  <rect class="box" x="20" y="606" width="1080" height="40" rx="6"/>
  <text class="w" x="560" y="623" text-anchor="middle">AUDIT LOG (append-only) — every attempt: allow · hold · deny · halt · settle, each with its reason;</text>
  <text class="w" x="560" y="639" text-anchor="middle">effects add result refs · matches add obligation refs + a consumption receipt</text>
</svg>
