apiVersion: registry/v1.0
domain: payments
# Domain model for the payments demo. Pairs with payments-ops.stele.yaml.
# Defines the Payment entity and the `pay` action the policy references.

connectors:
  ledger-sql: { type: sql }       # serves observe / record / transition
  ledger-pay: { type: method }    # the effect binding that performs `pay`
  export:     { type: method }    # binding for exportData (denied by policy)

scopePredicates:    [ tenantOf ]
preconditionChecks: [ payeeCoolingOffElapsed ]   # named check (pass/fail) you implement
handlers:           [ recordLedgerEntry ]        # named post-action handler you implement

namedSets:
  sanctioned-list: { source: "sets/sanctioned-countries.txt" }

entities:

  Account:
    label: "A ledger account"
    dataSource: ledger-sql
    table: accounts
    properties:
      number:  { type: string }
      balance: { type: decimal }
      tenant:  { type: string }     # scope key for tenantOf(actor)

  Payee:
    label: "A payment recipient"
    dataSource: ledger-sql
    table: payees
    properties:
      name:               { type: string }
      iban:               { type: string }
      destinationCountry: { type: string }
      createdAt:          { type: dateTime }   # read by payeeCoolingOffElapsed

  Payment:
    label: "An outbound payment"
    dataSource: ledger-sql
    table: payments
    properties:
      amount:             { type: decimal, required: true }
      currency:           { type: string }
      destinationCountry: { type: string }
      newPayee:           { type: boolean }
      payee:              { type: Payee }
      tenant:             { type: string }
      currentState:       { values: [pending, dispatching, done, failed, cancelled] }
    actions:
      # Reversibility is a DOMAIN decision, not intrinsic to "payment": this demo
      # domain declares no in-system refund the gateway can route to, so `pay` is
      # `irreversible` here. The central registry/stonefold-registry.yaml models the same
      # action `compensable` with a declared `refund` compensation — both are
      # correct for their domain (RFC §5; docs/09 §4).
      pay:
        kind: effect
        attributes: { reversibility: irreversible, operativeForce: high }
        connector: ledger-pay
        postActions: [ recordLedgerEntry ]   # intrinsic: runs after a successful payment
        data:
          amount:             { type: decimal, required: true }
          currency:           { type: string }
          destinationCountry: { type: string }
          newPayee:           { type: boolean }
        resolve:
          payee: { entity: Payee }
      exportData:
        kind: effect
        attributes: { reversibility: irreversible }
        connector: export

  LedgerEntry:
    label: "A double-entry ledger line"
    dataSource: ledger-sql
    table: ledger_entries
    properties:
      amount: { type: decimal }
      type:   { values: [debit, credit] }
      memo:   { type: string }

  Invoice:
    label: "A vendor invoice"
    dataSource: ledger-sql
    table: invoices
    properties:
      number:       { type: string }
      currentState: { values: [draft, sent, paid] }
    actions:
      send:     { kind: transition, from: [draft], to: sent }
      markPaid: { kind: transition, from: [sent],  to: paid }
