apiVersion: registry/v1.0
domain: ward-nurse
# Domain model for the ward-nurse example. Pairs with ward-nurse.acp.yaml.
# Shows assess / record / effect / transition actions named directly.

connectors:
  ehr-sql: { type: sql }     # serves observe / record / transition
  emar:    { type: method }  # medication-administration binding
  paging:  { type: method }  # paging binding

scopePredicates:    [ inWard, forPatientInWard ]
preconditionChecks: [ fiveRightsVerified, notDiscontinued ]
sinks:              [ careTeam ]

entities:

  Patient:
    label: "A patient on the ward"
    dataSource: ehr-sql
    table: patients
    properties:
      name: { type: string }
      mrn:  { type: string }
      ward: { type: string }                              # scope key for inWard(actor.ward)
      resultSensitivity:
        type: string
        derived: "record.confidential ? 'restricted' : 'internal'"   # per-record sensitivity
    actions:
      triage:                          # assess named directly (no fake entity needed)
        kind: assess
        attributes: { explainability: required }
        data:
          acuity:      { type: int, required: true }
          explanation: { type: string }

  Medication:
    label: "A medication order/record"
    dataSource: ehr-sql
    table: medications
    properties:
      name:          { type: string }
      isHighAlert:   { type: boolean }
      currentStatus: { values: [active, discontinued] }
    actions:
      administer:                       # effect named directly
        kind: effect
        attributes:
          reversibility: irreversible
          operativeForce: { derived: "isHighAlert ? 'high' : 'low'" }
        connector: emar
        data:
          drug: { type: string, required: true }
          dose: { type: string }
      prescribe:                        # exists so the policy can deny it
        kind: effect
        attributes: { reversibility: irreversible, operativeForce: high }
        connector: emar
      discontinue:                      # exists so the policy can deny it
        kind: effect
        attributes: { reversibility: compensable }
        connector: emar

  Observation:
    label: "A clinical observation (e.g. vitals)"
    dataSource: ehr-sql
    table: observations
    properties:
      type:      { type: string }
      value:     { type: string }
      patient:   { type: Patient }
    # observe + record implicit; policy grants `record: [Observation]`.

  Order:
    label: "A clinical order"
    dataSource: ehr-sql
    table: orders
    properties:
      orderNo:      { type: string }
      currentState: { values: [draft, signed, dispatched] }
    actions:
      sign: { kind: transition, from: [draft], to: signed }

  Encounter:
    label: "A patient encounter"
    dataSource: ehr-sql
    table: encounters
    properties:
      currentState: { values: [open, discharged] }
    actions:
      discharge:  { kind: transition, from: [open], to: discharged }
      pageOnCall: { kind: effect, attributes: { reversibility: reversible }, connector: paging }
