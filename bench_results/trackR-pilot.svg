<text x="60" y="396" class="cap">Bars: out of 20 attempts each (10 tasks × 2 repeats, Claude Haiku 4.5), how often the model called the capability the task needed —</text>
<text x="60" y="412" class="cap">with look-alike capabilities in the selection space (confusable), different prompt wordings (explicit / vague), ~2,000 tokens of prior conversation</text>
<text x="60" y="428" class="cap">(context2k), and production-length tool descriptions (realistic). "no-tool" prompts need NO call — that bar is how often the model correctly stayed quiet.</text>
